<!DOCTYPE html>
<html>
<head>
  <title>😂 Laughing Bot Fest</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="hero">
    <h1>😂 Laughing Bot Fest 😂</h1>
    <p>"If you don’t laugh… we refund your sadness 🤣"</p>

    <a href="/portfolio.html">
      <button>👨‍💻 View Developer</button>
    </a>
  </div>

  <div class="form-container">
    <h2>🎤 Register for Comedy Show</h2>

    <form action="/register" method="POST">

      <input type="text" name="name" placeholder="Your Name 😂" required>

      <input type="email" name="email" placeholder="Your Email 📧" required>

      <!-- CLASS INPUT (TEXT) -->
      <input type="text" name="className" placeholder="Your Class (e.g. BSc AIML A)" required>

      <!-- TIMING OPTIONS -->
      <select name="timing">
        <option value="Morning Show">🌞 Morning Show (10 AM)</option>
        <option value="Evening Show">🌙 Evening Show (5 PM)</option>
      </select>

      <button type="submit">🤣 Book My Seat</button>

    </form>
  </div>

</body>
</html>
